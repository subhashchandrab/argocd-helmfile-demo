repositories:
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx
  - name: jetstack
    url: https://charts.jetstack.io    

releases:
  - name: my-nginx
    namespace: web-apps
    chart: ingress-nginx/ingress-nginx
    version: 4.10.0
    values:
      - controller:
          replicaCount: 2

  - name: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: v1.14.0 # It is best practice to pin your version  
    values:
      - installCRDs: true
    createNamespace: true
    wait: true
