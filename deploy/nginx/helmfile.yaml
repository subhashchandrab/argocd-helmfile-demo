environments:
  default:
    values:
      - ../environments/env.yaml
      
repositories:
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx 

releases:
  - name: ingress-nginx
    namespace: ingress-nginx
    chart: ingress-nginx/ingress-nginx
    version: 4.10.0
    values:
    - {{ .Values | toYaml | nindent 8 }}
